name: Check Documentation Updates

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.check.outputs.files }}
      has_updates: ${{ steps.check.outputs.has_updates }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check for updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CONFIG_PATH=$(python -c "import json; print(json.load(open('check_updates.json'))['config_path'])")
          echo "config_path=$CONFIG_PATH" >> $GITHUB_OUTPUT
          export CONFIG_PATH=$CONFIG_PATH
          python -c "
          from scripts.main import run_check_workflow
          run_check_workflow()
          "
      
      - name: Trigger translation workflow
        if: steps.check.outputs.has_updates == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: translate-docs.yml
          inputs: |
            {"files": "${{ steps.check.outputs.files }}", "config_path": "${{ steps.check.outputs.config_path }}"}
          token: ${{ secrets.PAT_TOKEN }}
